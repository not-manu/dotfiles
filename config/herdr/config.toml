onboarding = false

[[keys.command]]
key = "prefix+g"
command = "/opt/homebrew/bin/lazygit"
type = "pane"
description = "Open lazygit"

# Flexoki Dark — https://stephango.com/flexoki
# Applied as full token overrides, so the base `name` is irrelevant.
[theme]
name = "vesper"
auto_switch = false

[theme.custom]
accent = "#3AA99F"      # cyan-400
panel_bg = "#100F0F"    # black
surface0 = "#1C1B1A"    # base-950
surface1 = "#282726"    # base-900
surface_dim = "#100F0F" # black
overlay0 = "#575653"    # base-700
overlay1 = "#6F6E69"    # base-600
text = "#CECDC3"        # base-200
subtext0 = "#878580"    # base-500
mauve = "#8B7EC8"       # purple-400
green = "#879A39"       # green-400
yellow = "#D0A215"      # yellow-400
red = "#D14D41"         # red-400
blue = "#4385BE"        # blue-400
teal = "#3AA99F"        # cyan-400
peach = "#DA702C"       # orange-400
