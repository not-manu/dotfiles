# =============================================================================
# Plugins
# =============================================================================

set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'
set -g @plugin 'wfxr/tmux-fzf-url'

# tmux-continuum: auto-save every 15 min, auto-restore on tmux start
set -g @continuum-restore 'on'

# =============================================================================
# General
# =============================================================================

# Prefix: keep default Ctrl-b
set -g prefix C-b
bind C-b send-prefix

# Start window and pane numbering at 1 (easier to reach on keyboard)
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on   # Re-number windows when one is closed

# Enable 256-color and true color support
set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",xterm-256color:RGB"

# Increase scrollback buffer
set -g history-limit 10000

# Enable mouse (scroll, resize panes, click to focus)
set -g mouse on

# Reduce escape-time (important for vim — prevents delay on <Esc>)
set -sg escape-time 10

# Allow repeated key presses for 1 second after prefix (for -r bindings)
set -g repeat-time 1000

# Focus events (lets vim know when the terminal gains/loses focus)
set -g focus-events on

# =============================================================================
# Vim-style keybinds
# =============================================================================

# Vi-mode for navigating and copying text
setw -g mode-keys vi

# Vim-style pane navigation with prefix + h/j/k/l (repeatable)
bind -r h select-pane -L
bind -r j select-pane -D
bind -r k select-pane -U
bind -r l select-pane -R

# Vim-style pane resizing with prefix + H/J/K/L (repeatable)
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# Window navigation (non-repeatable so the prefix releases immediately
# and following keys go straight to the pane, e.g. nvim)
bind n next-window
bind p previous-window

# Repeatable window reordering
bind -r < swap-window -d -t -1
bind -r > swap-window -d -t +1

# Intuitive split bindings (open in current path)
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
unbind '"'
unbind %

# Open new windows in current path
bind c new-window -c "#{pane_current_path}"

# Copy-mode vim bindings: v to select, y to yank
bind -T copy-mode-vi v send-keys -X begin-selection
bind -T copy-mode-vi y send-keys -X copy-selection-and-cancel

# Quick reload of config
bind r source-file ~/.config/tmux/tmux.conf \; display "Config reloaded"

# Kill current session (with confirmation)
bind X confirm-before -p "kill session '#S'? (y/n)" kill-session

# Fzf session switcher: prefix + f — compact, telescope-style picker
bind f display-popup -w 30% -h 40% -E \
  "tmux list-sessions -F '#{?session_attached,●,○} #{session_name}\t#{session_windows}w' \
     | column -ts $'\t' \
     | fzf \
       --prompt='  ' \
       --pointer='▌' \
       --layout=reverse \
       --no-info \
       --no-scrollbar \
       --border=none \
       --margin=1,2 \
       --color=fg:#878580,bg:#100F0F,hl:#CECDC3 \
       --color=fg+:#CECDC3,bg+:#1C1B1A,hl+:#CECDC3 \
       --color=gutter:#100F0F \
       --color=pointer:#AD8301,prompt:#AD8301 \
     | awk '{print \$2}' | xargs -r tmux switch-client -t"

# Fzf window switcher: prefix + w (with preview of panes in window)
bind w display-popup -w 60% -h 70% -E \
  "tmux list-windows -F '#{window_index} #{window_name}' | fzf \
    --prompt='  window: ' \
    --layout=reverse \
    --border=none \
    --preview='tmux list-panes -t :{1} -F \"  #{pane_index}  #{pane_current_command}  #{pane_current_path}\" 2>/dev/null' \
    --preview-window=right,40%,border-left \
    --color=fg:#878580,bg:#100F0F,hl:#CECDC3 \
    --color=fg+:#CECDC3,bg+:#1C1B1A,hl+:#CECDC3 \
    --color=border:#343331,header:#CECDC3,gutter:#100F0F \
    --color=spinner:#24837B,info:#24837B,separator:#1C1B1A \
    --color=pointer:#AD8301,marker:#AF3029,prompt:#AD8301 \
    --color=preview-fg:#878580,preview-bg:#100F0F \
  | awk '{print \$1}' | xargs -r tmux select-window -t"

# =============================================================================
# Flexoki Dark color palette
# https://stephango.com/flexoki
# =============================================================================

flexoki_black="#100f0f"
flexoki_base_950="#1c1b1a"
flexoki_base_900="#282726"
flexoki_base_850="#343331"
flexoki_base_800="#403e3c"
flexoki_base_700="#575653"
flexoki_base_600="#6f6e69"
flexoki_base_500="#878580"
flexoki_base_300="#b7b5ac"
flexoki_base_200="#cecdc3"

flexoki_red="#af3029"
flexoki_orange="#bc5215"
flexoki_yellow="#ad8301"
flexoki_green="#66800b"
flexoki_cyan="#24837b"
flexoki_blue="#205ea6"
flexoki_purple="#5e409d"
flexoki_magenta="#a02f6f"

flexoki_red_2="#d14d41"
flexoki_orange_2="#da702c"
flexoki_yellow_2="#d0a215"
flexoki_green_2="#879a39"
flexoki_cyan_2="#3aa99f"
flexoki_blue_2="#4385be"
flexoki_purple_2="#8b7ec8"

# Semantic aliases
color_bg=$flexoki_black
color_bg_2=$flexoki_base_950
color_ui=$flexoki_base_900
color_ui_2=$flexoki_base_850
color_ui_3=$flexoki_base_800
color_tx=$flexoki_base_200
color_tx_2=$flexoki_base_500
color_tx_3=$flexoki_base_700

# =============================================================================
# Status bar — top, centered
# =============================================================================

set -g status 2
set -g status-position top
set -g status-justify centre          # Center the window list

# Second line is a blank spacer for breathing room
set -g status-format[1] "#[bg=$color_bg]"

set -g status-bg $color_bg
set -g status-fg $color_tx

set -g status-left-length 40
set -g status-right-length 40

# Left: session name — green when normal, red when prefix is active
set -g status-left "#{?client_prefix,#[fg=$flexoki_black#,bg=$flexoki_red_2],#[fg=$flexoki_black#,bg=$flexoki_green_2]} #S #[default]"

# Right: time only
set -g status-right "#[fg=$flexoki_base_500,bg=$color_bg] %H:%M "

# Window list (centered by status-justify centre)
setw -g window-status-format         "#[fg=$color_ui_3,bg=$color_bg] #I #[fg=$color_tx_3]#W  "
setw -g window-status-current-format "#[fg=$color_tx_2,bg=$color_ui] #I #[fg=$color_tx,bold]#W  "
setw -g window-status-separator      ""

# Activity/bell: highlight windows where a process has finished
setw -g monitor-activity on
setw -g monitor-bell on
set  -g visual-activity off          # Don't flash a message, just style it
set  -g visual-bell off
set  -g activity-action other        # Only flag non-current windows

setw -g window-status-activity-style "fg=$flexoki_orange_2,bg=$color_bg,none"
setw -g window-status-bell-style     "fg=$flexoki_red_2,bg=$color_bg,none"

# =============================================================================
# Pane borders — subtle
# =============================================================================

set -g pane-border-style        "fg=$color_bg,bg=$color_bg"
set -g pane-active-border-style "fg=$color_bg,bg=$color_bg"
set -g pane-border-lines        single

set -g popup-border-style       "fg=$flexoki_base_700"
set -g popup-border-lines       "single"

# =============================================================================
# Messages and copy-mode
# =============================================================================

set -g message-style         "fg=$color_tx,bg=$color_ui_2"
set -g message-command-style "fg=$color_tx,bg=$color_ui_2"

setw -g mode-style           "fg=$flexoki_black,bg=$flexoki_orange_2,bold"
setw -g clock-mode-colour    $flexoki_blue_2

# =============================================================================
# Initialize TPM (keep at the very bottom)
# =============================================================================

run '~/.tmux/plugins/tpm/tpm'
