# =============================================================================
# mini.conf — nested "mini tmux" for running inside a pane of the main tmux
#
# Launched via mini.sh on a SEPARATE SOCKET (`tmux -L mini`), i.e. its own
# tmux server. Sessions here never appear in the main server's pickers
# (prefix+f / list-sessions) — fully isolated.
#
# Prefix is C-a (main tmux keeps C-b), so both layers work side by side.
# Deliberately plugin-free and lightweight.
# =============================================================================

# =============================================================================
# General
# =============================================================================

# Prefix: C-s — home row, no conflict with the outer tmux's C-b or with
# neovim (C-f is page-down there). Requires `stty -ixon` in .zshrc so the
# terminal doesn't eat C-s as flow-control. C-s C-s sends a literal C-s.
set -g prefix C-s
unbind C-b
bind C-s send-prefix

# Start window numbering at 1, renumber on close
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on

# Colors / terminal (we run nested inside the outer tmux)
set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",xterm-256color:RGB"

set -g history-limit 10000
set -g mouse on
set -sg escape-time 10
set -g repeat-time 1000
set -g focus-events on

# Don't exit the server when the last session closes — keeps instances
# alive so `mini` re-attaches to the same three windows
set -g exit-empty off
set -g detach-on-destroy off

# =============================================================================
# Keybinds
# =============================================================================

setw -g mode-keys vi

# Instance switching — the whole point of this thing.
# C-s 1/2/3 jump straight to an instance; C-s n/p cycle;
# C-s Space toggles the last two windows.
bind Space last-window
bind n next-window
bind p previous-window

# Window naming: automatic-rename tracks the running process by default,
# but a manual rename (prefix + ,) sticks — tmux disables auto-rename for
# that window. allow-rename off stops programs from overriding names via
# escape sequences either way.
set -g allow-rename off
bind , command-prompt -I "#W" "rename-window -- '%%'"

# New instance / window (in current path)
bind c new-window -c "#{pane_current_path}"

# Splits, should you ever want them inside an instance
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
unbind '"'
unbind %

# Vim-style pane navigation + resizing
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# Zoom (match main config's muscle memory)
bind m resize-pane -Z

# Copy-mode vim bindings
bind -T copy-mode-vi v send-keys -X begin-selection
bind -T copy-mode-vi y send-keys -X copy-selection-and-cancel

# Detach back to the outer tmux
bind d detach-client

# Reload this config
bind r source-file ~/.config/tmux/mini.conf \; display "mini config reloaded"

# Kill current session (with confirmation)
bind X confirm-before -p "kill mini session '#S'? (y/n)" kill-session

# =============================================================================
# Flexoki Dark palette (subset)
# =============================================================================

flexoki_black="#100f0f"
flexoki_base_950="#1c1b1a"
flexoki_base_900="#282726"
flexoki_base_800="#403e3c"
flexoki_base_700="#575653"
flexoki_base_500="#878580"
flexoki_base_200="#cecdc3"
flexoki_orange_2="#da702c"
flexoki_red_2="#d14d41"
flexoki_green_2="#879a39"

color_bg=$flexoki_black
color_ui=$flexoki_base_900
color_tx=$flexoki_base_200
color_tx_2=$flexoki_base_500
color_tx_3=$flexoki_base_700

# =============================================================================
# Status bar — BOTTOM (main tmux is top) and cyan-accented (main is green)
# so you can always tell which layer you're looking at
# =============================================================================

set -g status 2
set -g status-position bottom
set -g status-justify centre

# Blank spacer line for breathing room (mirrors main config's gap).
# Bar is at the bottom, so the spacer goes ABOVE it: move the real bar
# (default format) to line 1, blank out line 0.
set -gF status-format[1] "#{status-format[0]}"
set -g status-format[0] "#[bg=$color_bg]"

set -g status-bg $color_bg
set -g status-fg $color_tx

set -g status-left-length 20
set -g status-right-length 20

# Left: session badge — green when idle, red when prefix is active (matches main)
set -g status-left "#{?client_prefix,#[fg=$flexoki_black#,bg=$flexoki_red_2],#[fg=$flexoki_black#,bg=$flexoki_green_2]} #S #[default]"
set -g status-right ""

# Window list
setw -g window-status-format         "#[fg=$flexoki_base_800,bg=$color_bg] #I #[fg=$color_tx_3]#W#{?window_zoomed_flag,#[fg=$flexoki_orange_2] ✻,}  "
setw -g window-status-current-format "#[fg=$color_tx_2,bg=$color_ui] #I #[fg=$color_tx,bold]#W#{?window_zoomed_flag,#[fg=$flexoki_orange_2#,nobold] ✻,}  "
setw -g window-status-separator      ""

# Activity flags — useful for spotting an agent that finished in another window
setw -g monitor-activity on
setw -g monitor-bell on
set  -g visual-activity off
set  -g visual-bell off
set  -g activity-action other
setw -g window-status-activity-style "fg=$flexoki_orange_2,bg=$color_bg,none"
setw -g window-status-bell-style     "fg=$flexoki_red_2,bg=$color_bg,none"

# =============================================================================
# Borders / messages
# =============================================================================

set -g pane-border-style        "fg=$color_bg,bg=$color_bg"
set -g pane-active-border-style "fg=$color_bg,bg=$color_bg"

set -g message-style         "fg=$color_tx,bg=$flexoki_base_950"
set -g message-command-style "fg=$color_tx,bg=$flexoki_base_950"
setw -g mode-style           "fg=$flexoki_black,bg=$flexoki_orange_2,bold"
