"$schema" = 'https://starship.rs/config-schema.json'

# Flexoki Dark palette (https://stephango.com/flexoki)
palette = "flexoki"

format = """
$directory\
$git_branch\
$git_status\
$git_state\
$cmd_duration\
$line_break\
$character"""

add_newline = true

[palettes.flexoki]
red = "#D14D41"
orange = "#DA702C"
yellow = "#D0A215"
green = "#879A39"
cyan = "#3AA99F"
blue = "#4385BE"
purple = "#8B7EC8"
magenta = "#CE5D97"
fg = "#CECDC3"
muted = "#878580"
faint = "#575653"

[directory]
style = "blue bold"
truncation_length = 3
truncate_to_repo = true
truncation_symbol = ""
read_only = " "
read_only_style = "red"
# no trailing space — the next module supplies the leading gap
format = "[$path]($style)[$read_only]($read_only_style)"

[git_branch]
symbol = " "
style = "cyan"
# "on  branch" — connector in faint grey; no trailing space since the
# branch symbol already carries a leading space, so the gap stays single
format = "[ on](faint)[$symbol$branch]($style)"

[git_status]
style = "yellow"
# each part is its own conditional group: a leading space appears only when
# that part is present, so flags read "!2 +2 ?3 ↑1" with single spaces.
# yellow = worktree dirty · green = staged · blue = push/pull
format = "([ $conflicted]($style))([ $stashed]($style))([ $modified]($style))([ $untracked]($style))([ $deleted]($style))([ $renamed]($style))([ $staged](green bold))([ $ahead_behind](blue bold))"
conflicted = "=${count}"       # merge conflict
stashed = "*${count}"          # stashed entries
modified = "!${count}"         # unstaged edits
untracked = "?${count}"        # new files
deleted = "✘${count}"
renamed = "»${count}"
staged = "+${count}"           # staged for commit
ahead = "↑${count}"            # commits to push
behind = "↓${count}"           # commits to pull
diverged = "↑${ahead_count}↓${behind_count}"

[git_state]
style = "magenta"
format = "[ \\($state($progress_current/$progress_total)\\)]($style)"

[cmd_duration]
min_time = 2000
style = "faint"
# "took 3s" reads like prose
format = "[ took $duration]($style)"

[character]
# insert mode — filled square, green on success, red on error
success_symbol = "[■](green bold)"
error_symbol = "[■](red bold)"
# vim modes use a hollow square: filled = inserting, hollow = command mode.
# normal = yellow · replace = purple · visual = cyan
vimcmd_symbol = "[□](yellow bold)"
vimcmd_replace_one_symbol = "[□](purple bold)"
vimcmd_replace_symbol = "[□](purple bold)"
vimcmd_visual_symbol = "[□](cyan bold)"
